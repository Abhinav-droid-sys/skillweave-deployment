version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nco-qdrant
    ports:
      - "6333:6333"   # REST/HTTP
      - "6334:6334"   # gRPC
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nco-backend
    ports:
      - "8000:8000"
    volumes:
      # If you need SQLite data to persist, you can create a local volume for it
      - backend_data:/app/data
    env_file:
      - ./backend/.env
    depends_on:
      - qdrant
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nco-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
